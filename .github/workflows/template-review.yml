name: Template and Example Completeness Review

on:
  pull_request:
    paths:
      - 'examples/_examples/**'
      - 'templates/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Validate content completeness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"
          git diff --name-only --diff-filter=AM "$BASE" "$HEAD" -- \
            'examples/_examples/*.md' \
            'templates/*.md' \
            > /tmp/changed-files.txt
          echo "Changed files:"
          cat /tmp/changed-files.txt

      - name: Run completeness validation
        id: validate
        run: |
          python3 scripts/validate-content.py \
            --files-from /tmp/changed-files.txt \
            > /tmp/review-comment.md
          VALIDATE_EXIT=$?
          cat /tmp/review-comment.md
          exit $VALIDATE_EXIT

      - name: Post or update PR comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('/tmp/review-comment.md', 'utf8');
            if (!comment.trim()) {
              core.info('No comment content to post');
              return;
            }
            const marker = '<!-- template-completeness-review -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment,
              });
              core.info(`Updated existing review comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
              core.info('Created new review comment');
            }
