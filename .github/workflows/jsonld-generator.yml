name: JSON-LD Structured Data Generator

on:
  pull_request:
    paths:
      - 'examples/_examples/**'
      - 'templates/building-access-guide.md'

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-jsonld:
    name: Generate schema.org JSON-LD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"
          git diff --name-only --diff-filter=AM "$BASE" "$HEAD" -- \
            'examples/_examples/*.md' \
            'templates/building-access-guide.md' \
            > /tmp/changed-files.txt
          echo "Changed files:"
          cat /tmp/changed-files.txt

      - name: Generate JSON-LD from access guide
        id: generate
        run: |
          python3 scripts/generate-jsonld.py \
            --files-from /tmp/changed-files.txt \
            > /tmp/jsonld-comment.md
          echo "Generated comment preview:"
          head -20 /tmp/jsonld-comment.md || true

      - name: Post or update PR comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('/tmp/jsonld-comment.md', 'utf8');
            if (!comment.trim()) {
              core.info('No JSON-LD comment to post');
              return;
            }
            const marker = '<!-- jsonld-generator -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment,
              });
              core.info(`Updated existing JSON-LD comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
              core.info('Created new JSON-LD comment');
            }
